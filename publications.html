<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TELIS Publications</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div class="header-content">
        <img src="logoTEL.png" 
             alt="TELIS - Technology-Enhanced Learning & Intelligent Systems" 
             class="logo">

        <div>
            <h1>TELIS Research Publications</h1>
            <p>Technology-Enhanced Learning & Intelligent Systems</p>
            <p>
                LMCS Laboratory<br>
                École nationale Supérieure d’Informatique (ESI), Algiers
            </p>
        </div>
    </div>
</header>

<!-- ================= NAV ================= -->
<nav aria-label="Main navigation"> 
    <a href="index.html">About</a>
    <a href="index.html#lmcs">LMCS</a>
    <a href="index.html#research">Research</a>
    <a href="index.html#members">Members</a>
    <a href="index.html#contact">Contact</a>
    <a href="publications.html">Publications</a>
</nav>

<!-- ================= LOGIN BUTTON ================= -->
<div style="text-align:center; margin:20px;">
    <button id="openLoginBtn">Member Access</button>
</div>

<!-- ================= LOGIN MODAL ================= -->
<div id="loginModal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close">&times;</span>

        <h2>Member Login</h2>

        <!-- EMAIL -->
        <input type="text" id="email" placeholder="Email or login">

        <!-- PASSWORD (UI ONLY - NOT USED FOR REAL SECURITY) -->
        <input type="password" id="password" placeholder="Password">

        <button id="loginBtn">Login</button>

    </div>

</div>

<!-- ================= ADD PUBLICATION ================= -->
<div id="submitBox" style="display:none;">

    <h2>Add Publication</h2>

    <input id="title" placeholder="Title">
    <input id="authors" placeholder="Authors (comma separated)">
    <input id="year" type="number" placeholder="Year">

    <select id="category">
        <option>Journal</option>
        <option>Conference</option>
        <option>Book</option>
    </select>

    <input id="url" placeholder="Publication URL">

    <button id="addBtn">Add Publication</button>

</div>

<!-- ================= FILTER ================= -->
<div class="pub-controls">
    <input type="text" id="search" placeholder="Search publications">

    <select id="filterCategory">
        <option value="all">All</option>
        <option>Journal</option>
        <option>Conference</option>
        <option>Book</option>
    </select>
</div>

<!-- ================= LIST ================= -->
<div id="papers"></div>

<script type="module" src="publications.js"></script>

</body>
</html>
